services:
  - type: web
    name: formationai-backend
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python main.py"
    plan: free
    branch: deploy-test-angela
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: YOUTUBE_COOKIES_B64
        value: ""  # Add your base64-encoded cookies here
    autoDeploy: false